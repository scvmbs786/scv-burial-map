<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SCV Burial Map</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>SCV Muslim Burial Section</h1>
    <p>Click a space to view details.</p>
  </header>

  <main>
    <section class="map-container">
     <div>
      <input 
        id="searchInput" 
        type="text" 
        placeholder="Search by name…" 
        style="margin-bottom: 12px; padding: 6px 10px; width: 240px; font-size: 16px;"
      >
      </div>
      <div>
      <svg id="burial-map" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      <div>
      <ul class="legend">
        <li><span class="legend-box available"></span> Available</li>
        <li><span class="legend-box reserved"></span> Reserved</li>
        <li><span class="legend-box occupied"></span> Occupied</li>
	<li><span class="legend-box not-available"></span> Not Available</li>
      </ul>
      </div>
<div id="tooltip" class="tooltip hidden">
  <button class="tooltip-close">×</button>
  <div id="tooltip-content"></div>
</div>
    </section>

    <section class="details-panel">
      <h2>Space details</h2>
      <div id="details-content">
        <p>Select a space on the map.</p>
      </div>

      <h3>Legend</h3>
      <ul class="legend">
        <li><span class="legend-box available"></span> Available</li>
        <li><span class="legend-box reserved"></span> Reserved</li>
        <li><span class="legend-box occupied"></span> Occupied</li>
	<li><span class="legend-box not-available"></span> Not Available</li>
      </ul>
    </section>
  </main>

  <script src="plots-data.js"></script>
  <script src="script.js"></script>
</body>
</html>
