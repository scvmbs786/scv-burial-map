<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SCV Burial Map</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>SCV Muslim Burial Section</h1>
    <p>Click a space to view details.</p>
  </header>

  <main>
    <section class="map-container">
      <svg id="burial-map" xmlns="http://www.w3.org/2000/svg"></svg>
    </section>

    <section class="details-panel">
      <h2>Space details</h2>
      <div id="details-content">
        <p>Select a space on the map.</p>
      </div>

      <h3>Legend</h3>
      <ul class="legend">
        <li><span class="legend-box available"></span> Available</li>
        <li><span class="legend-box reserved"></span> Reserved</li>
        <li><span class="legend-box occupied"></span> Occupied</li>
      </ul>
    </section>
  </main>

  <script src="plots-data.js"></script>
  <script src="script.js"></script>
</body>
</html>
