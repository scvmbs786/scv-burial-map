<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SCV Burial Map</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>SCV Muslim Burial Section</h1>
    <p>Click a space to view details.</p>
  </header>

  <main>
    <section class="map-container">
      <div>
        <input 
          id="searchInput" 
          type="text" 
          placeholder="Search by name…" 
          style="margin-bottom: 12px; padding: 6px 10px; width: 240px; font-size: 16px;"
        >
      </div>

      <div>
        <svg id="burial-map" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>

      <!-- Tooltip -->
      <div id="tooltip" class="tooltip hidden">
        <button class="tooltip-close">×</button>
        <div id="tooltip-content"></div>
      </div>
    </section>

    <!-- NEW BOTTOM LEGEND -->
    <section class="bottom-legends">
      <div class="legend-row">
        <div class="legend-item">
          <span class="legend-box available"></span> Available
        </div>
        <div class="legend-item">
          <span class="legend-box reserved"></span> Reserved
        </div>
        <div class="legend-item">
          <span class="legend-box occupied"></span> Occupied
        </div>
      </div>

      <div class="legend-row">
        <div class="legend-item">
          <span class="legend-box not-available"></span> Not Available
        </div>
        <div class="legend-item">
          <span class="legend-box future"></span> Future Expansion
        </div>
      </div>
    </section>

  </main>

  <script src="plots-data.js"></script>
  <script src="script.js"></script>
</body>
</html>
